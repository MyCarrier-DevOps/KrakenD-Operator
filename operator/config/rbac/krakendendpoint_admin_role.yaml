# This rule is not used by the project krakend-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over gateway.krakend.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: krakend-operator
    app.kubernetes.io/managed-by: kustomize
  name: krakendendpoint-admin-role
rules:
- apiGroups:
  - gateway.krakend.io
  resources:
  - krakendendpoints
  verbs:
  - '*'
- apiGroups:
  - gateway.krakend.io
  resources:
  - krakendendpoints/status
  verbs:
  - get
