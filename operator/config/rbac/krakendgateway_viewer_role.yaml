# This rule is not used by the project krakend-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to gateway.krakend.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: krakend-operator
    app.kubernetes.io/managed-by: kustomize
  name: krakendgateway-viewer-role
rules:
- apiGroups:
  - gateway.krakend.io
  resources:
  - krakendgateways
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.krakend.io
  resources:
  - krakendgateways/status
  verbs:
  - get
