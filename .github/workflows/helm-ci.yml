name: Helm CI

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Lint Helm chart
        run: helm lint charts/krakend-operator

  template:
    name: Helm Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Template Helm chart
        run: helm template test charts/krakend-operator > /dev/null
