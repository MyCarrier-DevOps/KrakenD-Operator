name: CI

on:
  push:
    branches: [main]
    paths:
      - "operator/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "operator/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: operator
          args: --config ../.github/.golangci.yml --timeout 5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Run unit tests
        working-directory: operator
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./internal/... ./api/... ./cmd/...
          go tool cover -func=coverage.out
      - name: Check coverage threshold
        uses: vladopajic/go-test-coverage@v2
        with:
          config: operator/.testcoverage.yml
          source-dir: ./operator

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Build binary
        working-directory: operator
        run: make build

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Run e2e tests
        working-directory: operator
        run: make test-e2e
