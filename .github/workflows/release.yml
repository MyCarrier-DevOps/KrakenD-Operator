name: Release

on:
  push:
    branches: [main]
    paths:
      - "operator/**"
      - "charts/**"
      - ".github/workflows/release.yml"

permissions:
  contents: write
  packages: write
  pages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mycarrier-devops/krakend-operator

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: operator
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.new_version }}
            org.opencontainers.image.source=https://github.com/MyCarrier-DevOps/KrakenD-Operator
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=operator-image
          cache-to: type=gha,mode=max,scope=operator-image

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set chart version
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          cd charts/krakend-operator
          sed -i "s/^version:.*/version: ${VERSION}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" Chart.yaml

      - name: Copy CRDs into chart
        run: cp operator/config/crd/bases/*.yaml charts/krakend-operator/crds/

      - uses: azure/setup-helm@v5

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git stash --include-untracked
            git switch --orphan gh-pages
            git commit --allow-empty -m "Initialize gh-pages for Helm chart releases"
            git push origin gh-pages
            git checkout -
            git stash pop
          fi

      - name: Release Helm chart
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_tag }}
          body: |
            ## KrakenD Operator ${{ steps.version.outputs.new_tag }}

            ${{ steps.version.outputs.changelog }}

            ### Container Image

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
            ```

            ### Helm Chart

            ```bash
            helm repo add krakend-operator https://mycarrier-devops.github.io/KrakenD-Operator
            helm repo update
            helm install krakend-operator krakend-operator/krakend-operator \
              --version ${{ steps.version.outputs.new_version }} \
              --namespace krakend-operator-system --create-namespace
            ```
