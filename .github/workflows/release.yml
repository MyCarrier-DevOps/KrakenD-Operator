name: Release

on:
  push:
    branches: [main]
    paths:
      - "operator/**"
      - "charts/**"
      - ".github/workflows/release.yml"

permissions:
  contents: write
  packages: write
  pages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mycarrier-devops/krakend-operator

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: operator
          args: --config ../.github/.golangci.yml --timeout 5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Run unit tests
        working-directory: operator
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./internal/... ./api/... ./cmd/...
          go tool cover -func=coverage.out
      - name: Check coverage threshold
        uses: vladopajic/go-test-coverage@v2
        with:
          config: operator/.testcoverage.yml
          source-dir: ./operator

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Build binary
        working-directory: operator
        run: make build

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Run e2e tests
        working-directory: operator
        run: go test -v -timeout 30m ./test/e2e/ -ginkgo.v

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: Lint Helm chart
        run: helm lint charts/krakend-operator
      - name: Template Helm chart
        run: helm template test charts/krakend-operator > /dev/null

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test-e2e, helm-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: operator
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.new_version }}
            org.opencontainers.image.source=https://github.com/MyCarrier-DevOps/KrakenD-Operator
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set chart version
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          cd charts/krakend-operator
          sed -i "s/^version:.*/version: ${VERSION}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" Chart.yaml

      - name: Copy CRDs into chart
        run: cp operator/config/crd/bases/*.yaml charts/krakend-operator/crds/

      - uses: azure/setup-helm@v4

      - name: Release Helm chart
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_tag }}
          body: |
            ## KrakenD Operator ${{ steps.version.outputs.new_tag }}

            ${{ steps.version.outputs.changelog }}

            ### Container Image

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
            ```

            ### Helm Chart

            ```bash
            helm repo add krakend-operator https://mycarrier-devops.github.io/KrakenD-Operator
            helm repo update
            helm install krakend-operator krakend-operator/krakend-operator \
              --version ${{ steps.version.outputs.new_version }} \
              --namespace krakend-operator-system --create-namespace
            ```
