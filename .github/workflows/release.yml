name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mycarrier-devops/krakend-operator

jobs:
  build-and-push-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: operator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-helm-chart:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push-image
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd charts/krakend-operator
          sed -i "s/^version:.*/version: ${VERSION}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" Chart.yaml
          echo "Chart.yaml after version update:"
          head -10 Chart.yaml

      - name: Copy CRDs into chart
        run: cp operator/config/crd/bases/*.yaml charts/krakend-operator/crds/

      - uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  create-github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push-image, release-helm-chart]
    steps:
      - uses: actions/checkout@v6

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat << 'EOF' > body.md
          ## KrakenD Operator ${GITHUB_REF_NAME}

          ### Container Image

          ```bash
          docker pull ghcr.io/mycarrier-devops/krakend-operator:${VERSION}
          ```

          ### Helm Chart

          ```bash
          helm repo add krakend-operator https://mycarrier-devops.github.io/KrakenD-Operator
          helm repo update
          helm install krakend-operator krakend-operator/krakend-operator \
            --version ${VERSION} \
            --namespace krakend-operator-system --create-namespace
          ```
          EOF
          # Expand variables in the heredoc
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\${GITHUB_REF_NAME}/$GITHUB_REF_NAME/g" body.md
          sed -i "s/\${VERSION}/$VERSION/g" body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          generate_release_notes: false
