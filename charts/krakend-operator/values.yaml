replicaCount: 1

image:
  repository: ghcr.io/mycarrier-devops/krakend-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set, a name is generated using the fullname template.
  name: ""

leaderElection:
  enabled: true

metrics:
  enabled: true
  service:
    port: 8443

healthProbes:
  port: 8081

webhooks:
  enabled: true
  # failurePolicy determines what happens when the webhook is unavailable.
  # Use "Fail" for production (block invalid resources) or "Ignore" to allow
  # resources through when the operator is down.
  failurePolicy: Fail
  certManager:
    # Enable cert-manager integration for automatic TLS certificate provisioning.
    # Requires cert-manager to be installed in the cluster.
    enabled: true
  # caBundle is only used when certManager.enabled is false.
  # Provide a base64-encoded CA certificate bundle for the webhook server.
  caBundle: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
