---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "krakend-operator.fullname" . }}-manager-role
  labels:
    {{- include "krakend-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dragonflydb.io
  resources:
  - dragonflies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - external-secrets.io
  resources:
  - externalsecrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.krakend.io
  resources:
  - krakendautoconfigs
  - krakendbackendpolicies
  - krakendendpoints
  - krakendgateways
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.krakend.io
  resources:
  - krakendautoconfigs/finalizers
  - krakendbackendpolicies/finalizers
  - krakendendpoints/finalizers
  - krakendgateways/finalizers
  verbs:
  - update
- apiGroups:
  - gateway.krakend.io
  resources:
  - krakendautoconfigs/status
  - krakendbackendpolicies/status
  - krakendendpoints/status
  - krakendgateways/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.istio.io
  resources:
  - virtualservices
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "krakend-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "krakend-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "krakend-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "krakend-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
