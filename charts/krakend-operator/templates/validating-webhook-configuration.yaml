{{- if .Values.webhooks.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "krakend-operator.fullname" . }}-validating-webhook
  labels:
    {{- include "krakend-operator.labels" . | nindent 4 }}
  {{- if .Values.webhooks.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "krakend-operator.fullname" . }}-serving-cert
  {{- end }}
webhooks:
  - name: vkrakendgateway.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "krakend-operator.fullname" . }}-webhook-service
        namespace: {{ .Release.Namespace }}
        path: /validate-gateway-krakend-io-v1alpha1-krakendgateway
      {{- if not .Values.webhooks.certManager.enabled }}
      caBundle: {{ .Values.webhooks.caBundle | default "" | b64enc }}
      {{- end }}
    failurePolicy: {{ .Values.webhooks.failurePolicy }}
    rules:
      - apiGroups:
          - gateway.krakend.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
          - DELETE
        resources:
          - krakendgateways
    sideEffects: None
  - name: vkrakendendpoint.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "krakend-operator.fullname" . }}-webhook-service
        namespace: {{ .Release.Namespace }}
        path: /validate-gateway-krakend-io-v1alpha1-krakendendpoint
      {{- if not .Values.webhooks.certManager.enabled }}
      caBundle: {{ .Values.webhooks.caBundle | default "" | b64enc }}
      {{- end }}
    failurePolicy: {{ .Values.webhooks.failurePolicy }}
    rules:
      - apiGroups:
          - gateway.krakend.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - krakendendpoints
    sideEffects: None
  - name: vkrakendbackendpolicy.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "krakend-operator.fullname" . }}-webhook-service
        namespace: {{ .Release.Namespace }}
        path: /validate-gateway-krakend-io-v1alpha1-krakendbackendpolicy
      {{- if not .Values.webhooks.certManager.enabled }}
      caBundle: {{ .Values.webhooks.caBundle | default "" | b64enc }}
      {{- end }}
    failurePolicy: {{ .Values.webhooks.failurePolicy }}
    rules:
      - apiGroups:
          - gateway.krakend.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
          - DELETE
        resources:
          - krakendbackendpolicies
    sideEffects: None
  - name: vkrakendautoconfig.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "krakend-operator.fullname" . }}-webhook-service
        namespace: {{ .Release.Namespace }}
        path: /validate-gateway-krakend-io-v1alpha1-krakendautoconfig
      {{- if not .Values.webhooks.certManager.enabled }}
      caBundle: {{ .Values.webhooks.caBundle | default "" | b64enc }}
      {{- end }}
    failurePolicy: {{ .Values.webhooks.failurePolicy }}
    rules:
      - apiGroups:
          - gateway.krakend.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - krakendautoconfigs
    sideEffects: None
{{- end }}
